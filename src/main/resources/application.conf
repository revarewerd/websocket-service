# =============================================================
# WEBSOCKET SERVICE — КОНФИГУРАЦИЯ
# =============================================================
# HTTP порт обслуживает и REST (health) и WebSocket на одном порту.
# Kafka: два consumer'а — для GPS позиций и бизнес-событий.
# Throttle: ограничение частоты отправки позиций клиентам.
# =============================================================

kafka {
  bootstrap-servers = "localhost:9092"
  bootstrap-servers = ${?KAFKA_BROKERS}

  # Топик GPS позиций (от Connection Manager)
  gps-events-topic = "gps-events"
  gps-events-topic = ${?KAFKA_GPS_EVENTS_TOPIC}

  # Топик событий геозон (от Rule Checker)
  geozone-events-topic = "geozone-events"
  geozone-events-topic = ${?KAFKA_GEOZONE_EVENTS_TOPIC}

  # Топик нарушений скорости (от Rule Checker)
  rule-violations-topic = "rule-violations"
  rule-violations-topic = ${?KAFKA_RULE_VIOLATIONS_TOPIC}

  # Consumer group для GPS позиций (отдельная от других сервисов)
  positions-group-id = "ws-positions"
  positions-group-id = ${?KAFKA_POSITIONS_GROUP_ID}

  # Consumer group для бизнес-событий
  events-group-id = "ws-events"
  events-group-id = ${?KAFKA_EVENTS_GROUP_ID}
}

http {
  # Порт для HTTP (health) и WebSocket соединений
  port = 8090
  port = ${?HTTP_PORT}
}

throttle {
  # Минимальный интервал между отправками позиции одного ТС (мс).
  # 1000 = не чаще 1 раз в секунду на каждое ТС.
  position-interval-ms = 1000
  position-interval-ms = ${?THROTTLE_POSITION_INTERVAL_MS}
}
